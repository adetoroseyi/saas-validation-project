name: Send Emails

on:
  schedule:
    - cron: '0 8 * * 1-5'   # 08:00 UTC Monday–Friday (after lead sourcing)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — preview emails without sending'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      limit:
        description: 'Max emails to send this run'
        required: false
        default: '25'

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send emails
        env:
          SENDING_EMAIL: ${{ secrets.SENDING_EMAIL }}
          SENDING_NAME: ${{ secrets.SENDING_NAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAILOCTOPUS_API_KEY: ${{ secrets.EMAILOCTOPUS_API_KEY }}
          EMAILOCTOPUS_LIST_ID: ${{ secrets.EMAILOCTOPUS_LIST_ID }}
          DAILY_SEND_CAP: ${{ github.event.inputs.limit || '25' }}
          MIN_SECONDS_BETWEEN_SENDS: ${{ secrets.MIN_SECONDS_BETWEEN_SENDS || '90' }}
          USE_SMTP: '1'
          USE_GMAIL_MCP: '0'
          LOG_LEVEL: INFO
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" -a "${{ github.event.inputs.dry_run }}" = "" ]; then
            DRY_FLAG="--dry-run"
          else
            DRY_FLAG=""
          fi
          echo "Running: python scripts/send_emails.py $DRY_FLAG --limit ${{ github.event.inputs.limit || '25' }}"
          python scripts/send_emails.py $DRY_FLAG \
            --limit ${{ github.event.inputs.limit || '25' }}

      - name: Commit state changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 02-leads/leads.json 03-emails/sent_log.json 07-launch-list/launch_contacts.json
          git diff --staged --quiet || git commit -m "chore: email send run [skip ci]"
          git push
